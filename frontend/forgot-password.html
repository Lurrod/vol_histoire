<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Mot de passe oublié — Vol d'Histoire</title>
  <link rel="preload" href="fonts/DMSans.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/BarlowCondensed-700.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/core.min.css">
  <link rel="stylesheet" href="css/login.min.css">
  <style>
    .fp-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--night, #0D0D0D);
    }
    .fp-card {
      background: rgba(20,20,20,0.95);
      border: 1px solid rgba(200,169,110,0.12);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .fp-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .fp-logo i { color: #C8A96E; }
    .fp-card h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 0.5rem;
    }
    .fp-card p.fp-desc {
      color: rgba(255,255,255,0.45);
      font-size: 0.9rem;
      line-height: 1.7;
      margin: 0 0 2rem;
    }
    .fp-field { margin-bottom: 1.25rem; }
    .fp-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }
    .fp-field input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #ffffff;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s ease;
      box-sizing: border-box;
    }
    .fp-field input:focus { border-color: rgba(200,169,110,0.4); }
    .fp-submit {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, rgba(200,169,110,0.15), rgba(200,169,110,0.08));
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 10px;
      color: #C8A96E;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .fp-submit:hover:not(:disabled) {
      background: rgba(200,169,110,0.2);
      border-color: rgba(200,169,110,0.5);
      transform: translateY(-1px);
    }
    .fp-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .fp-success {
      display: none;
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }
    .fp-success i { font-size: 2.5rem; color: #34d964; margin-bottom: 1rem; display: block; }
    .fp-success h2 { color: #ffffff; font-size: 1.25rem; margin: 0 0 0.5rem; }
    .fp-success p { color: rgba(255,255,255,0.45); font-size: 0.9rem; line-height: 1.7; margin: 0; }
    .fp-back {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1.5rem;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s ease;
    }
    .fp-back:hover { color: rgba(255,255,255,0.65); }
    .fp-error {
      display: none;
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.2);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #e74c3c;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .loading-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(200,169,110,0.3);
      border-top-color: #C8A96E;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script defer src="js/app-version.js?v=1775742573525"></script>
  <script defer src="js/sentry-init.js?v=1775742573525"></script>
</head>
<body class="page-login">
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KB3P52VK"
height="0" width="0" class="gtm-noscript"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<div class="fp-wrapper">
  <div class="fp-card">
    <div class="fp-logo">
      <i class="fas fa-jet-fighter"></i>
      <span>Vol d'Histoire</span>
    </div>

    <div id="fp-form-section">
      <h1 data-i18n="forgot_password.heading">Mot de passe oublié</h1>
      <p class="fp-desc" data-i18n="forgot_password.desc">Entrez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>

      <div id="fp-error" class="fp-error"></div>

      <form id="fp-form">
        <div class="fp-field">
          <label for="fp-email" data-i18n="forgot_password.email_label">Adresse email</label>
          <input type="email" id="fp-email" placeholder="votre@email.com" required aria-required="true" autocomplete="email">
        </div>
        <button type="submit" class="fp-submit" id="fp-submit-btn">
          <i class="fas fa-paper-plane"></i>
          <span data-i18n="forgot_password.submit">Envoyer le lien</span>
        </button>
      </form>
    </div>

    <div id="fp-success" class="fp-success">
      <i class="fas fa-envelope-open-text"></i>
      <h2 data-i18n="forgot_password.success_title">Email envoyé !</h2>
      <p data-i18n-html="forgot_password.success_desc">Si un compte vérifié existe avec cette adresse, vous recevrez un email dans quelques minutes.<br><br>Pensez à vérifier vos spams.</p>
    </div>

    <a href="/login" class="fp-back">
      <i class="fas fa-arrow-left"></i> <span data-i18n="login.back_to_login">Retour à la connexion</span>
    </a>
  </div>
</div>

<script defer src="js/auth.js?v=1775742573525"></script>
<script defer src="js/captcha.js?v=1775742573525"></script>
  <script defer src="js/forgot-password.js?v=1775742573525"></script>
</body>
</html>
