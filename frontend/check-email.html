<!DOCTYPE html>
<html lang="fr">
<head>
<!-- Google Tag Manager -->
<script defer src="js/gtm.js?v=1775742573525"></script>
<script defer src="js/sw-register.js"></script>
<!-- End Google Tag Manager -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/svg+xml" sizes="16x16" href="/assets/logo/favicon-16.svg">
  <link rel="apple-touch-icon" href="/assets/logo/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="robots" content="noindex, nofollow">
  <title>Vérifiez votre email — Vol d'Histoire</title>
  <link rel="preload" href="fonts/DMSans.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/BarlowCondensed-700.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/core.min.css">
  <link rel="stylesheet" href="css/login.min.css">
  <style>
    .ce-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--night, #0D0D0D);
    }
    .ce-card {
      background: rgba(20,20,20,0.95);
      border: 1px solid rgba(200,169,110,0.12);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .ce-icon-wrap {
      width: 80px;
      height: 80px;
      background: rgba(200,169,110,0.06);
      border: 1px solid rgba(200,169,110,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
    }
    .ce-icon-wrap i {
      font-size: 2rem;
      color: #C8A96E;
    }
    .ce-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .ce-logo i { color: #C8A96E; }
    .ce-card h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 0.75rem;
    }
    .ce-card p {
      color: rgba(255,255,255,0.45);
      font-size: 0.9rem;
      line-height: 1.75;
      margin: 0 0 0.5rem;
    }
    .ce-email-badge {
      display: inline-block;
      background: rgba(200,169,110,0.07);
      border: 1px solid rgba(200,169,110,0.15);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: 600;
      margin: 1rem 0 1.5rem;
      word-break: break-all;
    }
    .ce-hint {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.75rem;
      text-align: left;
    }
    .ce-hint p {
      margin: 0;
      font-size: 0.83rem;
      color: rgba(255,255,255,0.35);
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      line-height: 1.5;
    }
    .ce-hint p + p { margin-top: 0.6rem; }
    .ce-hint i { color: rgba(255,255,255,0.2); margin-top: 2px; flex-shrink: 0; }
    .ce-resend-btn {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, rgba(200,169,110,0.12), rgba(200,169,110,0.06));
      border: 1px solid rgba(200,169,110,0.25);
      border-radius: 10px;
      color: #C8A96E;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .ce-resend-btn:hover:not(:disabled) {
      background: rgba(200,169,110,0.18);
      border-color: rgba(200,169,110,0.4);
      transform: translateY(-1px);
    }
    .ce-resend-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .ce-resend-btn.sent {
      color: #34d964;
      border-color: rgba(52,217,100,0.3);
      background: rgba(52,217,100,0.06);
    }
    .ce-back {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      font-size: 0.83rem;
      transition: color 0.2s ease;
    }
    .ce-back:hover { color: rgba(255,255,255,0.6); }
    .loading-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(200,169,110,0.3);
      border-top-color: #C8A96E;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script defer src="js/sentry-init.js?v=1775742573525"></script>
</head>
<body class="page-login">
<div class="ce-wrapper">
  <div class="ce-card">
    <div class="ce-logo"><img src="/assets/logo/vh-lockup-horizontal-mono-gold.svg" alt="Vol d'Histoire" class="auth-lockup" width="225" height="50"></div>

    <div class="ce-icon-wrap">
      <i class="fas fa-envelope-open-text"></i>
    </div>

    <h1 data-i18n="check_email.heading">Vérifiez votre boîte mail</h1>
    <p data-i18n="check_email.desc">Un lien de confirmation a été envoyé à :</p>
    <div class="ce-email-badge" id="ce-email">—</div>

    <div class="ce-hint">
      <p><i class="fas fa-clock"></i><span data-i18n-html="check_email.validity_hint">Le lien est valable <strong>30 minutes</strong>.</span></p>
      <p><i class="fas fa-folder"></i><span data-i18n-html="check_email.spam_hint">Pensez à vérifier vos <strong>spams</strong> si vous ne trouvez pas l'email.</span></p>
    </div>

    <button type="button" class="ce-resend-btn" id="ce-resend-btn">
      <i class="fas fa-redo"></i>
      <span data-i18n="check_email.resend">Renvoyer l'email</span>
    </button>

    <a href="/login" class="ce-back">
      <i class="fas fa-arrow-left"></i> <span data-i18n="login.back_to_login">Retour à la connexion</span>
    </a>
  </div>
</div>

<script defer src="js/vendor/purify.min.js"></script>
<script defer src="js/dist/app.min.js?v=1775742573525"></script>
<script defer src="js/check-email.js?v=1775742573525"></script>
</body>
</html>
