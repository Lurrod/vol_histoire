<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/svg+xml" sizes="16x16" href="/assets/logo/favicon-16.svg">
  <link rel="apple-touch-icon" href="/assets/logo/icon-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="robots" content="noindex, nofollow">
  <title>Réinitialiser le mot de passe — Vol d'Histoire</title>
  <link rel="preload" href="fonts/DMSans.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/BarlowCondensed-700.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/core.min.css">
  <link rel="stylesheet" href="css/login.min.css">
  <style>
    .rp-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--night, #0D0D0D);
    }
    .rp-card {
      background: rgba(20,20,20,0.95);
      border: 1px solid rgba(200,169,110,0.12);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .rp-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .rp-logo i { color: #C8A96E; }
    .rp-card h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 0.5rem;
    }
    .rp-card p.rp-desc {
      color: rgba(255,255,255,0.45);
      font-size: 0.9rem;
      line-height: 1.7;
      margin: 0 0 2rem;
    }
    .rp-field { margin-bottom: 1.25rem; position: relative; }
    .rp-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }
    .rp-field .input-wrap { position: relative; }
    .rp-field input {
      width: 100%;
      padding: 0.75rem 2.75rem 0.75rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #ffffff;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s ease;
      box-sizing: border-box;
    }
    .rp-field input:focus { border-color: rgba(200,169,110,0.4); }
    .toggle-pw {
      position: absolute;
      right: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      padding: 0;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: rgba(255,255,255,0.7); }
    .strength-bar {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-top: 0.5rem;
      overflow: hidden;
    }
    .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: width 0.3s, background 0.3s; }
    .strength-hint { font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-top: 0.3rem; }
    .rp-submit {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, rgba(200,169,110,0.15), rgba(200,169,110,0.08));
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 10px;
      color: #C8A96E;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .rp-submit:hover:not(:disabled) {
      background: rgba(200,169,110,0.2);
      border-color: rgba(200,169,110,0.5);
      transform: translateY(-1px);
    }
    .rp-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .rp-error {
      display: none;
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.2);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #e74c3c;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .rp-invalid {
      text-align: center;
      padding: 1rem 0;
    }
    .rp-invalid i { font-size: 2.5rem; color: #e74c3c; display: block; margin-bottom: 1rem; }
    .rp-invalid h2 { color: #ffffff; font-size: 1.25rem; margin: 0 0 0.5rem; }
    .rp-invalid p { color: rgba(255,255,255,0.45); font-size: 0.9rem; margin: 0 0 1.5rem; }
    .rp-back {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1.5rem;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s ease;
    }
    .rp-back:hover { color: rgba(255,255,255,0.65); }
    .loading-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(200,169,110,0.3);
      border-top-color: #C8A96E;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script defer src="js/sentry-init.js?v=1775742573525"></script>
</head>
<body class="page-login">
<div class="rp-wrapper">
  <div class="rp-card">
    <div class="rp-logo"><img src="/assets/logo/vh-lockup-horizontal-mono-gold.svg" alt="Vol d'Histoire" class="auth-lockup" width="190" height="50"></div>

    <!-- Token invalide / absent -->
    <div id="rp-invalid" class="rp-invalid hidden">
      <i class="fas fa-times-circle"></i>
      <h2 data-i18n="reset_password.invalid_heading">Lien invalide</h2>
      <p data-i18n-html="reset_password.invalid_desc">Ce lien est invalide ou a expiré.<br>Demandez un nouveau lien de réinitialisation.</p>
      <a href="/forgot-password" class="rp-newlink-btn">
        <i class="fas fa-redo"></i> <span data-i18n="reset_password.new_link">Nouveau lien</span>
      </a>
    </div>

    <!-- Formulaire -->
    <div id="rp-form-section">
      <h1 data-i18n="reset_password.heading">Nouveau mot de passe</h1>
      <p class="rp-desc" data-i18n="reset_password.desc">Choisissez un nouveau mot de passe sécurisé pour votre compte.</p>

      <div id="rp-error" class="rp-error" role="alert" aria-live="polite"></div>

      <form id="rp-form">
        <div class="rp-field">
          <label for="rp-password" data-i18n="reset_password.password_label">Nouveau mot de passe</label>
          <div class="input-wrap">
            <input type="password" id="rp-password" placeholder="••••••••" required autocomplete="new-password" aria-describedby="rp-error">
            <button type="button" class="toggle-pw" id="toggle-rp-pw" data-i18n-aria="login.show_password" aria-label="Afficher le mot de passe">
              <i class="fas fa-eye-slash"></i>
            </button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="strength-hint" id="strength-hint" data-i18n="reset_password.strength_hint">8 caractères min, 1 majuscule, 1 chiffre</div>
        </div>
        <div class="rp-field">
          <label for="rp-password-confirm" data-i18n="reset_password.confirm_label">Confirmer le mot de passe</label>
          <div class="input-wrap">
            <input type="password" id="rp-password-confirm" placeholder="••••••••" required autocomplete="new-password" aria-describedby="rp-error">
            <button type="button" class="toggle-pw" id="toggle-rp-pw-confirm" data-i18n-aria="login.show_password" aria-label="Afficher le mot de passe">
              <i class="fas fa-eye-slash"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="rp-submit" id="rp-submit-btn">
          <i class="fas fa-lock"></i>
          <span data-i18n="reset_password.submit">Enregistrer le mot de passe</span>
        </button>
      </form>
    </div>

    <a href="/login" class="rp-back">
      <i class="fas fa-arrow-left"></i> <span data-i18n="login.back_to_login">Retour à la connexion</span>
    </a>
  </div>
</div>

<script defer src="js/vendor/purify.min.js"></script>
<script defer src="js/dist/app.min.js?v=1775742573525"></script>
<script defer src="js/reset-password.js?v=1775742573525"></script>
</body>
</html>
