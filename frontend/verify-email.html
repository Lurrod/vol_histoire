<!DOCTYPE html>
<html lang="fr">
<head>
<!-- Google Tag Manager -->
<script src="js/gtm.js"></script>
<!-- End Google Tag Manager -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Vérification de l'email — Vol d'Histoire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/login.css">
  <style>
    .verify-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--bg-primary, #080c14);
    }
    .verify-card {
      background: rgba(15,22,38,0.95);
      border: 1px solid rgba(200,169,110,0.12);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .verify-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    .verify-icon.loading { color: rgba(255,255,255,0.25); }
    .verify-icon.success { color: #34d964; }
    .verify-icon.error   { color: #e74c3c; }
    .verify-card h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 0.75rem;
    }
    .verify-card p {
      color: rgba(255,255,255,0.5);
      font-size: 0.95rem;
      line-height: 1.7;
      margin: 0 0 2rem;
    }
    .verify-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: rgba(200,169,110,0.1);
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 10px;
      color: #C8A96E;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s ease;
    }
    .verify-btn:hover {
      background: rgba(200,169,110,0.18);
      border-color: rgba(200,169,110,0.5);
      transform: translateY(-1px);
    }
    .verify-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KB3P52VK"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<div class="verify-wrapper">
  <div class="verify-card">
    <div id="state-loading">
      <div class="verify-spinner"></div>
      <h1>Vérification en cours...</h1>
      <p>Validation de votre adresse email, veuillez patienter.</p>
    </div>

    <div id="state-success" style="display:none">
      <i class="fas fa-check-circle verify-icon success"></i>
      <h1>Email vérifié !</h1>
      <p>Votre compte est maintenant actif. Vous pouvez vous connecter.</p>
      <a href="/login" class="verify-btn"><i class="fas fa-sign-in-alt"></i> Se connecter</a>
    </div>

    <div id="state-error" style="display:none">
      <i class="fas fa-times-circle verify-icon error"></i>
      <h1>Lien invalide</h1>
      <p id="error-message">Ce lien de vérification est invalide ou a expiré.</p>
      <a href="/login" class="verify-btn"><i class="fas fa-arrow-left"></i> Retour à la connexion</a>
    </div>
  </div>
</div>

<script defer src="js/verify-email.js"></script>
</body>
</html>
