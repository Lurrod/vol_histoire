openapi: 3.0.3
info:
  title: Vol d'Histoire API
  description: |
    API REST de l'encyclopédie de l'aviation militaire **Vol d'Histoire**.

    ## Authentification
    JWT en header `Authorization: Bearer <access_token>` (15 min) +
    refresh token en cookie HttpOnly (7 jours, rotation au refresh).

    ## Internationalisation
    Détectée via `?lang=fr|en` ou `Accept-Language`. Les fiches d'avions
    exposent `name_fr` / `country_name_fr` / `type_name_fr` en plus des
    champs traduits, comme **clés stables côté client** (utilisées dans les
    URLs de filtres pour rester valides indépendamment de la langue d'affichage).

    ## Anti-spam
    Les routes `/register` et `/auth/forgot-password` acceptent un token
    hCaptcha dans le body (`h-captcha-response`). Si `HCAPTCHA_SECRET`
    n'est pas configuré côté serveur, la vérification est skippée (mode dev).

    ## Cache & versioning
    Toutes les pages HTML sont servies avec un query string `?v=<version>`
    sur les assets pour bust le cache navigateur à chaque déploiement.
    Les statiques (CSS/JS/fonts) ont un `Cache-Control` long.
  version: 4.2.0
  contact:
    name: Vol d'Histoire
    url: https://vol-histoire.titouan-borde.com

servers:
  - url: /api
    description: API principale

tags:
  - name: Auth
    description: Inscription, connexion, tokens, vérification email, mot de passe oublié
  - name: Users
    description: Profil utilisateur et administration
  - name: Airplanes
    description: Avions — lecture, création, modification, suppression
  - name: Referentials
    description: Pays, générations, types, constructeurs
  - name: Favorites
    description: Gestion des favoris utilisateur
  - name: Stats
    description: Statistiques globales
  - name: Monitoring
    description: Liveness, readiness, métriques Prometheus, statut applicatif
  - name: Config
    description: Configuration publique exposée au frontend

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token JWT (15 min). Obtenu via POST /login ou POST /refresh.

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          example: Erreur serveur
        errorId:
          type: string
          example: a3f1b2c4

    AirplaneSummary:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          description: Nom (traduit selon `?lang=`)
          example: Rafale
        complete_name:
          type: string
          example: Dassault Rafale
        little_description:
          type: string
          description: Description courte traduite. `"Translation needed"` si pas de version EN.
        image_url:
          type: string
          format: uri
        max_speed:
          type: number
        country_name:
          type: string
          description: Nom du pays traduit selon `?lang=`
          example: France
        country_name_fr:
          type: string
          description: |
            **Clé canonique FR** du pays. Toujours en français quelle que soit
            la langue de la requête. À utiliser comme clé d'URL stable pour les
            filtres (`?country=États-Unis` marche en FR et EN).
          example: France
        country_code:
          type: string
          example: FRA
        generation:
          type: integer
          example: 4
        type_name:
          type: string
          description: Nom du type traduit selon `?lang=`
          example: Multirôle
        type_name_fr:
          type: string
          description: |
            **Clé canonique FR** du type. Même rôle que `country_name_fr`.
          example: Multirôle
        date_operationel:
          type: string
          format: date

    AirplaneDetail:
      allOf:
        - $ref: '#/components/schemas/AirplaneSummary'
        - type: object
          properties:
            description:
              type: string
            manufacturer_name:
              type: string
            date_concept:
              type: string
              format: date
            date_first_fly:
              type: string
              format: date
            max_range:
              type: number
            weight:
              type: number
            status:
              type: string

    AirplaneInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        complete_name:
          type: string
          maxLength: 255
        little_description:
          type: string
          maxLength: 255
        image_url:
          type: string
          format: uri
          maxLength: 2048
        description:
          type: string
          maxLength: 10000
        country_id:
          type: integer
        id_manufacturer:
          type: integer
        id_generation:
          type: integer
        type:
          type: integer
        status:
          type: string
          maxLength: 50
        date_concept:
          type: string
          format: date
        date_first_fly:
          type: string
          format: date
        date_operationel:
          type: string
          format: date
        max_speed:
          type: number
        max_range:
          type: number
        weight:
          type: number

    Armament:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    Tech:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    Mission:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    War:
      type: object
      properties:
        name:
          type: string
        date_start:
          type: string
          format: date
        date_end:
          type: string
          format: date
        description:
          type: string

    RelatedData:
      type: object
      properties:
        armament:
          type: array
          items:
            $ref: '#/components/schemas/Armament'
        tech:
          type: array
          items:
            $ref: '#/components/schemas/Tech'
        missions:
          type: array
          items:
            $ref: '#/components/schemas/Mission'
        wars:
          type: array
          items:
            $ref: '#/components/schemas/War'

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role_id:
          type: integer
          enum: [1, 2, 3]
          description: "1=admin, 2=éditeur, 3=membre"

    Country:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    Stats:
      type: object
      properties:
        airplanes:
          type: integer
        earliest_year:
          type: integer
          nullable: true
        latest_year:
          type: integer
          nullable: true
        countries:
          type: integer

  parameters:
    AirplaneId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: integer

paths:
  # ═══════════════════════════════════════════════════════════
  # AUTH
  # ═══════════════════════════════════════════════════════════
  /register:
    post:
      tags: [Auth]
      summary: Inscription
      description: Crée un compte et envoie un email de vérification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 255
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  description: "1 majuscule, 1 minuscule, 1 chiffre minimum"
                'h-captcha-response':
                  type: string
                  description: |
                    Token hCaptcha (optionnel). Vérifié côté serveur si
                    `HCAPTCHA_SECRET` est configuré, sinon ignoré.
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  warning:
                    type: string
                    enum: [EMAIL_NOT_SENT]
                    description: Présent si l'email de vérification n'a pas pu être envoyé
        '400':
          description: "Données invalides, email déjà utilisé, ou captcha invalide (code: CAPTCHA_FAILED)"
        '429':
          description: Rate limit (10 req / 15 min)

  /login:
    post:
      tags: [Auth]
      summary: Connexion
      description: |
        Retourne un access token JWT (15 min) dans le body et un refresh token
        en cookie HttpOnly SameSite=Strict (7 jours).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Connexion réussie
          headers:
            Set-Cookie:
              description: refreshToken (HttpOnly, SameSite=Strict, Path=/api)
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                    description: Access token JWT
        '400':
          description: Email ou mot de passe incorrect
        '403':
          description: Email non vérifié (code EMAIL_NOT_VERIFIED)
        '429':
          description: Rate limit (20 req / 15 min)

  /refresh:
    post:
      tags: [Auth]
      summary: Rafraîchir le token
      description: |
        Émet un nouveau access token + rotation du refresh token.
        Le refresh token est lu depuis le cookie `refreshToken`.
      responses:
        '200':
          description: Nouveau token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Refresh token absent, expiré ou révoqué

  /logout:
    post:
      tags: [Auth]
      summary: Déconnexion
      description: Révoque le refresh token et vide le cookie.
      responses:
        '200':
          description: Déconnexion réussie

  /auth/verify-email:
    get:
      tags: [Auth]
      summary: Vérifier l'email
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{64}$'
      responses:
        '200':
          description: Email vérifié avec succès
        '400':
          description: Token invalide ou expiré

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Renvoyer l'email de vérification
      description: Réponse toujours 200 (pas de fuite d'information).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email envoyé (si le compte existe et n'est pas vérifié)
        '429':
          description: Rate limit (3 req / 15 min)

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Mot de passe oublié
      description: |
        Réponse toujours 200 (pas de fuite d'information sur l'existence du compte).
        Protégé par hCaptcha si `HCAPTCHA_SECRET` est configuré côté serveur.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                'h-captcha-response':
                  type: string
                  description: Token hCaptcha (vérifié si configuré).
      responses:
        '200':
          description: Email de réinitialisation envoyé (si le compte existe)
        '400':
          description: "Captcha invalide (code: CAPTCHA_FAILED) ou email malformé"
        '429':
          description: Rate limit (3 req / 15 min)

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Réinitialiser le mot de passe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                  pattern: '^[a-f0-9]{64}$'
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        '200':
          description: Mot de passe réinitialisé
        '400':
          description: Token invalide ou mot de passe non conforme
        '429':
          description: Rate limit (5 req / 15 min)

  # ═══════════════════════════════════════════════════════════
  # USERS
  # ═══════════════════════════════════════════════════════════
  /users:
    get:
      tags: [Users]
      summary: Lister les utilisateurs (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Liste paginée
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalPages:
                        type: integer
        '403':
          description: Accès réservé aux admins

  /users/{id}:
    get:
      tags: [Users]
      summary: Profil utilisateur
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Profil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          description: Accès non autorisé (sauf son propre profil ou admin)
        '404':
          description: Utilisateur non trouvé

    put:
      tags: [Users]
      summary: Modifier son profil
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Mise à jour réussie
        '400':
          description: Données invalides
        '403':
          description: Accès non autorisé

    delete:
      tags: [Users]
      summary: Supprimer un compte
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Compte supprimé
        '403':
          description: Accès non autorisé

  /admin/users/{id}:
    put:
      tags: [Users]
      summary: Modifier un utilisateur (admin)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, role_id]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                role_id:
                  type: integer
                  enum: [1, 2, 3]
      responses:
        '200':
          description: Utilisateur modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          description: Accès réservé aux admins
        '409':
          description: Email déjà utilisé

  # ═══════════════════════════════════════════════════════════
  # AIRPLANES
  # ═══════════════════════════════════════════════════════════
  /airplanes:
    get:
      tags: [Airplanes]
      summary: Lister les avions
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            enum: [default, alphabetical, nation, service-date, generation, type]
        - name: country
          in: query
          schema:
            type: string
          description: Filtrer par nom de pays
        - name: generation
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10
        - name: type
          in: query
          schema:
            type: string
          description: Filtrer par nom de type
        - name: search
          in: query
          schema:
            type: string
            maxLength: 100
          description: |
            Recherche full-text (PostgreSQL `websearch_to_tsquery`) sur nom,
            nom complet, résumé et description (FR+EN). Syntaxe : mots libres,
            `"phrase exacte"`, `-exclusion`, `OR`. Quand `search` est présent,
            les résultats sont triés par pertinence (`ts_rank`), le paramètre
            `sort` est ignoré.
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Liste des avions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AirplaneSummary'

    post:
      tags: [Airplanes]
      summary: Créer un avion (admin/éditeur)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AirplaneInput'
      responses:
        '201':
          description: Avion créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirplaneDetail'
        '400':
          description: Données invalides ou référence FK invalide
        '403':
          description: Rôle insuffisant

  /airplanes/facets:
    get:
      tags: [Airplanes]
      summary: Compteurs de facettes pour les filtres du hangar
      description: |
        Retourne les compteurs `{ key: count }` pour les trois groupes
        de filtres : `countries`, `generations`, `types`.

        **Pattern faceted search** : chaque groupe est calculé en
        appliquant tous les filtres courants **sauf le sien**, ce qui
        permet d'afficher dans chaque dropdown les compteurs qui restent
        accessibles si on ajoute ce filtre (sans réduire le dropdown
        courant à zéro à cause de lui-même).

        Les clés sont toujours en français (clés canoniques FR), comme
        `country_name_fr` / `type_name_fr` sur les fiches.
      parameters:
        - in: query
          name: country
          schema: { type: string }
          description: Filtre pays canonique FR (ex `France`, `États-Unis`)
        - in: query
          name: generation
          schema: { type: integer }
        - in: query
          name: type
          schema: { type: string }
          description: Filtre type canonique FR (ex `Multirôle`)
      responses:
        '200':
          description: Compteurs de facettes
          content:
            application/json:
              schema:
                type: object
                properties:
                  countries:
                    type: object
                    additionalProperties: { type: integer }
                    example:
                      France: 12
                      États-Unis: 8
                  generations:
                    type: object
                    additionalProperties: { type: integer }
                    example:
                      "4": 18
                      "5": 6
                  types:
                    type: object
                    additionalProperties: { type: integer }
                    example:
                      Multirôle: 10
                      Bombardier: 4

  /airplanes/{id}:
    get:
      tags: [Airplanes]
      summary: Détail d'un avion
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          description: Détail complet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirplaneDetail'
        '404':
          description: Avion non trouvé

    put:
      tags: [Airplanes]
      summary: Modifier un avion (admin/éditeur)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AirplaneInput'
      responses:
        '200':
          description: Avion modifié
        '400':
          description: Données invalides
        '404':
          description: Avion non trouvé

    delete:
      tags: [Airplanes]
      summary: Supprimer un avion (admin/éditeur)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          description: Avion supprimé
        '404':
          description: Avion non trouvé

  /airplanes/{id}/armament:
    get:
      tags: [Airplanes]
      summary: Armement d'un avion
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Armament'

  /airplanes/{id}/tech:
    get:
      tags: [Airplanes]
      summary: Technologies d'un avion
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tech'

  /airplanes/{id}/missions:
    get:
      tags: [Airplanes]
      summary: Missions d'un avion
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mission'

  /airplanes/{id}/wars:
    get:
      tags: [Airplanes]
      summary: Conflits d'un avion
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/War'

  /airplanes/{id}/related:
    get:
      tags: [Airplanes]
      summary: Toutes les données liées (armement, tech, missions, conflits)
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelatedData'

  /airplanes/{id}/favorite:
    get:
      tags: [Favorites]
      summary: Vérifier si un avion est en favori
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  isFavorite:
                    type: boolean

  # ═══════════════════════════════════════════════════════════
  # REFERENTIALS
  # ═══════════════════════════════════════════════════════════
  /countries:
    get:
      tags: [Referentials]
      summary: Pays ayant au moins un avion
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Country'

  /generations:
    get:
      tags: [Referentials]
      summary: Générations disponibles
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer

  /types:
    get:
      tags: [Referentials]
      summary: Types d'avions
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string

  /manufacturers:
    get:
      tags: [Referentials]
      summary: Constructeurs
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    code:
                      type: string
                    country_id:
                      type: integer
                    country_name:
                      type: string

  /referentials:
    get:
      tags: [Referentials]
      summary: Tous les référentiels en 1 requête (countries + generations + types + manufacturers)
      description: |
        Endpoint combiné : exécute les 4 requêtes SQL en parallèle et retourne
        un seul payload. Permet au frontend d'éviter 4 round-trips HTTP successifs.
        Cacheable (Cache-Control: public, max-age=300, s-maxage=3600).
      responses:
        '200':
          headers:
            Cache-Control:
              schema:
                type: string
              description: 'public, max-age=300, s-maxage=3600, stale-while-revalidate=600'
          content:
            application/json:
              schema:
                type: object
                properties:
                  countries:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
                  generations:
                    type: array
                    items:
                      type: integer
                  types:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
                        description: { type: string, nullable: true }
                  manufacturers:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
                        code: { type: string }
                        country_id: { type: integer }
                        country_name: { type: string }
        '500':
          description: Erreur base de données

  # ═══════════════════════════════════════════════════════════
  # HEALTH
  # ═══════════════════════════════════════════════════════════
  /health:
    get:
      tags: [Health]
      summary: Health check (liveness + DB readiness)
      description: Vérifie la connectivité à PostgreSQL via `SELECT 1`. Utilisé par PM2/load balancer.
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  uptime: { type: number, description: 'Uptime serveur en secondes' }
                  timestamp: { type: string, format: date-time }
        '503':
          description: Base de données injoignable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: error }
                  message: { type: string }

  # ═══════════════════════════════════════════════════════════
  # FAVORITES
  # ═══════════════════════════════════════════════════════════
  /favorites:
    get:
      tags: [Favorites]
      summary: Mes favoris
      security:
        - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/AirplaneSummary'
                    - type: object
                      properties:
                        favorited_at:
                          type: string
                          format: date-time

  /favorites/{airplaneId}:
    post:
      tags: [Favorites]
      summary: Ajouter un favori
      security:
        - BearerAuth: []
      parameters:
        - name: airplaneId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Ajouté aux favoris
        '404':
          description: Avion introuvable

    delete:
      tags: [Favorites]
      summary: Retirer un favori
      security:
        - BearerAuth: []
      parameters:
        - name: airplaneId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Supprimé des favoris
        '404':
          description: Pas dans les favoris

  # ═══════════════════════════════════════════════════════════
  # STATS
  # ═══════════════════════════════════════════════════════════
  /stats:
    get:
      tags: [Stats]
      summary: Statistiques globales
      description: Cache en mémoire (TTL 5 min), invalidé à chaque modification d'avion.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stats'

  # ═══════════════════════════════════════════════════════════
  # CONFIG
  # ═══════════════════════════════════════════════════════════
  /config:
    get:
      tags: [Config]
      summary: Configuration publique exposée au frontend
      description: |
        Retourne la version applicative et la sitekey hCaptcha (publique).
        Le frontend lit cet endpoint au boot pour décider s'il doit charger
        le widget captcha. Cache 5 minutes.
      responses:
        '200':
          description: Configuration publique
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: "4.2.0"
                  hcaptchaSitekey:
                    type: string
                    nullable: true
                    description: Sitekey publique hCaptcha, ou `null` si non configurée

  # ═══════════════════════════════════════════════════════════
  # MONITORING
  # ═══════════════════════════════════════════════════════════
  /live:
    get:
      tags: [Monitoring]
      summary: Liveness probe
      description: |
        Toujours `200` tant que le process Express tourne. Aucune dépendance
        vérifiée — utiliser `/ready` pour la vraie santé applicative.
        Adapté pour Kubernetes `livenessProbe` ou un uptime monitor basique.
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  uptime: { type: number, description: Uptime du process en secondes }

  /ready:
    get:
      tags: [Monitoring]
      summary: Readiness probe
      description: |
        Vérifie que le pool PostgreSQL est initialisé et qu'un `SELECT 1`
        passe. Retourne `503` si la BD est inaccessible.
        Adapté pour Kubernetes `readinessProbe` ou un load balancer healthcheck.
      responses:
        '200':
          description: Application prête
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ready }
                  db:
                    type: object
                    properties:
                      ok: { type: boolean, example: true }
                      latencyMs: { type: integer, example: 3 }
        '503':
          description: BD inaccessible
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: not_ready }
                  db:
                    type: object
                    properties:
                      ok: { type: boolean, example: false }

  /metrics:
    get:
      tags: [Monitoring]
      summary: Métriques Prometheus
      description: |
        Texte plain Prometheus exposant les compteurs HTTP, latences,
        Node.js process metrics (heap, GC, event loop, etc.).
        Si la variable d'environnement `METRICS_TOKEN` est configurée,
        le endpoint exige `Authorization: Bearer <token>`.
      responses:
        '200':
          description: Métriques Prometheus
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP process_cpu_user_seconds_total Total user CPU time spent in seconds.
                  # TYPE process_cpu_user_seconds_total counter
                  process_cpu_user_seconds_total 1.234
        '401':
          description: Token manquant ou invalide (si `METRICS_TOKEN` configuré)

  /status:
    get:
      tags: [Monitoring]
      summary: Statut applicatif lisible
      description: |
        Retourne version, environnement, état Sentry, uptime, timestamp de
        démarrage et commit Git si exposé. Utilisé par les outils d'uptime
        et le frontend pour afficher la version courante.
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: "Vol d'histoire" }
                  version: { type: string, example: "4.2.0" }
                  env: { type: string, example: production }
                  sentry: { type: boolean, example: true }
                  uptimeSec: { type: integer, example: 3600 }
                  startedAt:
                    type: string
                    format: date-time
                    example: "2026-04-08T10:00:00.000Z"
                  commit:
                    type: string
                    nullable: true
                    description: Git commit hash si `GIT_COMMIT` env est défini
