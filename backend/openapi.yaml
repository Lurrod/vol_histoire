openapi: 3.0.3
info:
  title: Vol d'Histoire API
  description: |
    API REST de l'encyclopédie de l'aviation militaire **Vol d'Histoire**.
    Authentification par JWT (access token en header Bearer + refresh token en cookie HttpOnly).
  version: 1.0.0
  contact:
    name: Vol d'Histoire
    url: https://vol-histoire.titouan-borde.com

servers:
  - url: /api
    description: API principale

tags:
  - name: Auth
    description: Inscription, connexion, tokens, vérification email, mot de passe oublié
  - name: Users
    description: Profil utilisateur et administration
  - name: Airplanes
    description: Avions — lecture, création, modification, suppression
  - name: Referentials
    description: Pays, générations, types, constructeurs
  - name: Favorites
    description: Gestion des favoris utilisateur
  - name: Stats
    description: Statistiques globales

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token JWT (15 min). Obtenu via POST /login ou POST /refresh.

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          example: Erreur serveur
        errorId:
          type: string
          example: a3f1b2c4

    AirplaneSummary:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Rafale
        complete_name:
          type: string
          example: Dassault Rafale
        little_description:
          type: string
        image_url:
          type: string
          format: uri
        max_speed:
          type: number
        country_name:
          type: string
          example: France
        country_code:
          type: string
          example: FRA
        generation:
          type: integer
          example: 4
        type_name:
          type: string
          example: Multirôle
        date_operationel:
          type: string
          format: date

    AirplaneDetail:
      allOf:
        - $ref: '#/components/schemas/AirplaneSummary'
        - type: object
          properties:
            description:
              type: string
            manufacturer_name:
              type: string
            date_concept:
              type: string
              format: date
            date_first_fly:
              type: string
              format: date
            max_range:
              type: number
            weight:
              type: number
            status:
              type: string

    AirplaneInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        complete_name:
          type: string
          maxLength: 255
        little_description:
          type: string
          maxLength: 255
        image_url:
          type: string
          format: uri
          maxLength: 2048
        description:
          type: string
          maxLength: 10000
        country_id:
          type: integer
        id_manufacturer:
          type: integer
        id_generation:
          type: integer
        type:
          type: integer
        status:
          type: string
          maxLength: 50
        date_concept:
          type: string
          format: date
        date_first_fly:
          type: string
          format: date
        date_operationel:
          type: string
          format: date
        max_speed:
          type: number
        max_range:
          type: number
        weight:
          type: number

    Armament:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    Tech:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    Mission:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    War:
      type: object
      properties:
        name:
          type: string
        date_start:
          type: string
          format: date
        date_end:
          type: string
          format: date
        description:
          type: string

    RelatedData:
      type: object
      properties:
        armament:
          type: array
          items:
            $ref: '#/components/schemas/Armament'
        tech:
          type: array
          items:
            $ref: '#/components/schemas/Tech'
        missions:
          type: array
          items:
            $ref: '#/components/schemas/Mission'
        wars:
          type: array
          items:
            $ref: '#/components/schemas/War'

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role_id:
          type: integer
          enum: [1, 2, 3]
          description: "1=admin, 2=éditeur, 3=membre"

    Country:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    Stats:
      type: object
      properties:
        airplanes:
          type: integer
        earliest_year:
          type: integer
          nullable: true
        latest_year:
          type: integer
          nullable: true
        countries:
          type: integer

  parameters:
    AirplaneId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: integer

paths:
  # ═══════════════════════════════════════════════════════════
  # AUTH
  # ═══════════════════════════════════════════════════════════
  /register:
    post:
      tags: [Auth]
      summary: Inscription
      description: Crée un compte et envoie un email de vérification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 255
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  description: "1 majuscule, 1 minuscule, 1 chiffre minimum"
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Données invalides ou email déjà utilisé
        '429':
          description: Rate limit (10 req / 15 min)

  /login:
    post:
      tags: [Auth]
      summary: Connexion
      description: |
        Retourne un access token JWT (15 min) dans le body et un refresh token
        en cookie HttpOnly SameSite=Strict (7 jours).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Connexion réussie
          headers:
            Set-Cookie:
              description: refreshToken (HttpOnly, SameSite=Strict, Path=/api)
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                    description: Access token JWT
        '400':
          description: Email ou mot de passe incorrect
        '403':
          description: Email non vérifié (code EMAIL_NOT_VERIFIED)
        '429':
          description: Rate limit (20 req / 15 min)

  /refresh:
    post:
      tags: [Auth]
      summary: Rafraîchir le token
      description: |
        Émet un nouveau access token + rotation du refresh token.
        Le refresh token est lu depuis le cookie `refreshToken`.
      responses:
        '200':
          description: Nouveau token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Refresh token absent, expiré ou révoqué

  /logout:
    post:
      tags: [Auth]
      summary: Déconnexion
      description: Révoque le refresh token et vide le cookie.
      responses:
        '200':
          description: Déconnexion réussie

  /auth/verify-email:
    get:
      tags: [Auth]
      summary: Vérifier l'email
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{64}$'
      responses:
        '200':
          description: Email vérifié avec succès
        '400':
          description: Token invalide ou expiré

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Renvoyer l'email de vérification
      description: Réponse toujours 200 (pas de fuite d'information).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email envoyé (si le compte existe et n'est pas vérifié)
        '429':
          description: Rate limit (3 req / 15 min)

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Mot de passe oublié
      description: Réponse toujours 200 (pas de fuite d'information).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email de réinitialisation envoyé (si le compte existe)
        '429':
          description: Rate limit (3 req / 15 min)

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Réinitialiser le mot de passe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                  pattern: '^[a-f0-9]{64}$'
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        '200':
          description: Mot de passe réinitialisé
        '400':
          description: Token invalide ou mot de passe non conforme
        '429':
          description: Rate limit (5 req / 15 min)

  # ═══════════════════════════════════════════════════════════
  # USERS
  # ═══════════════════════════════════════════════════════════
  /users:
    get:
      tags: [Users]
      summary: Lister les utilisateurs (admin)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Liste paginée
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalPages:
                        type: integer
        '403':
          description: Accès réservé aux admins

  /users/{id}:
    get:
      tags: [Users]
      summary: Profil utilisateur
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Profil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          description: Accès non autorisé (sauf son propre profil ou admin)
        '404':
          description: Utilisateur non trouvé

    put:
      tags: [Users]
      summary: Modifier son profil
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Mise à jour réussie
        '400':
          description: Données invalides
        '403':
          description: Accès non autorisé

    delete:
      tags: [Users]
      summary: Supprimer un compte
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Compte supprimé
        '403':
          description: Accès non autorisé

  /admin/users/{id}:
    put:
      tags: [Users]
      summary: Modifier un utilisateur (admin)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, role_id]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                role_id:
                  type: integer
                  enum: [1, 2, 3]
      responses:
        '200':
          description: Utilisateur modifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          description: Accès réservé aux admins
        '409':
          description: Email déjà utilisé

  # ═══════════════════════════════════════════════════════════
  # AIRPLANES
  # ═══════════════════════════════════════════════════════════
  /airplanes:
    get:
      tags: [Airplanes]
      summary: Lister les avions
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            enum: [default, alphabetical, nation, service-date, generation, type]
        - name: country
          in: query
          schema:
            type: string
          description: Filtrer par nom de pays
        - name: generation
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10
        - name: type
          in: query
          schema:
            type: string
          description: Filtrer par nom de type
      responses:
        '200':
          description: Liste des avions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AirplaneSummary'

    post:
      tags: [Airplanes]
      summary: Créer un avion (admin/éditeur)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AirplaneInput'
      responses:
        '201':
          description: Avion créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirplaneDetail'
        '400':
          description: Données invalides ou référence FK invalide
        '403':
          description: Rôle insuffisant

  /airplanes/{id}:
    get:
      tags: [Airplanes]
      summary: Détail d'un avion
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          description: Détail complet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AirplaneDetail'
        '404':
          description: Avion non trouvé

    put:
      tags: [Airplanes]
      summary: Modifier un avion (admin/éditeur)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AirplaneInput'
      responses:
        '200':
          description: Avion modifié
        '400':
          description: Données invalides
        '404':
          description: Avion non trouvé

    delete:
      tags: [Airplanes]
      summary: Supprimer un avion (admin/éditeur)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          description: Avion supprimé
        '404':
          description: Avion non trouvé

  /airplanes/{id}/armament:
    get:
      tags: [Airplanes]
      summary: Armement d'un avion
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Armament'

  /airplanes/{id}/tech:
    get:
      tags: [Airplanes]
      summary: Technologies d'un avion
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tech'

  /airplanes/{id}/missions:
    get:
      tags: [Airplanes]
      summary: Missions d'un avion
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mission'

  /airplanes/{id}/wars:
    get:
      tags: [Airplanes]
      summary: Conflits d'un avion
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/War'

  /airplanes/{id}/related:
    get:
      tags: [Airplanes]
      summary: Toutes les données liées (armement, tech, missions, conflits)
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelatedData'

  /airplanes/{id}/favorite:
    get:
      tags: [Favorites]
      summary: Vérifier si un avion est en favori
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AirplaneId'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  isFavorite:
                    type: boolean

  # ═══════════════════════════════════════════════════════════
  # REFERENTIALS
  # ═══════════════════════════════════════════════════════════
  /countries:
    get:
      tags: [Referentials]
      summary: Pays ayant au moins un avion
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Country'

  /generations:
    get:
      tags: [Referentials]
      summary: Générations disponibles
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer

  /types:
    get:
      tags: [Referentials]
      summary: Types d'avions
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string

  /manufacturers:
    get:
      tags: [Referentials]
      summary: Constructeurs
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    country_name:
                      type: string

  # ═══════════════════════════════════════════════════════════
  # FAVORITES
  # ═══════════════════════════════════════════════════════════
  /favorites:
    get:
      tags: [Favorites]
      summary: Mes favoris
      security:
        - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/AirplaneSummary'
                    - type: object
                      properties:
                        favorited_at:
                          type: string
                          format: date-time

  /favorites/{airplaneId}:
    post:
      tags: [Favorites]
      summary: Ajouter un favori
      security:
        - BearerAuth: []
      parameters:
        - name: airplaneId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Ajouté aux favoris
        '404':
          description: Avion introuvable

    delete:
      tags: [Favorites]
      summary: Retirer un favori
      security:
        - BearerAuth: []
      parameters:
        - name: airplaneId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Supprimé des favoris
        '404':
          description: Pas dans les favoris

  # ═══════════════════════════════════════════════════════════
  # STATS
  # ═══════════════════════════════════════════════════════════
  /stats:
    get:
      tags: [Stats]
      summary: Statistiques globales
      description: Cache en mémoire (TTL 5 min), invalidé à chaque modification d'avion.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stats'
